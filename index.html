<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 固件下载器</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0b1e;
            --bg-secondary: #14162b;
            --bg-card: #1e2042;
            --bg-glass: rgba(30, 32, 66, 0.6);
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-dark: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(148, 163, 184, 0.15);
            --border-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow-soft: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            background-image: 
                radial-gradient(ellipse at top left, rgba(99, 102, 241, 0.15), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(139, 92, 246, 0.1), transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Layout */
        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            }
            50% {
                box-shadow: 0 4px 25px rgba(99, 102, 241, 0.6), 0 0 30px rgba(139, 92, 246, 0.3);
            }
        }

        .nav {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            padding: 0.6rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.15);
        }

        .nav-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .main {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        /* Search Page */
        .search-container {
            max-width: 750px;
            margin: 3rem auto;
            text-align: center;
        }

        .search-title {
            font-size: 2.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #e2e8f0 30%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .search-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }

        .search-box {
            display: flex;
            gap: 0.75rem;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.6rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent), 0 0 30px rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
            font-weight: 500;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-btn {
            padding: 1rem 2.25rem;
            background: var(--accent-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        .search-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .search-btn:hover::before {
            left: 100%;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Repo Grid */
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .repo-card {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.75rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .repo-card:hover::before {
            opacity: 1;
        }

        .repo-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--border-glow);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(99, 102, 241, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .repo-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .repo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--bg-card), rgba(99, 102, 241, 0.2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .repo-info {
            flex: 1;
            min-width: 0;
        }

        .repo-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-primary);
            word-break: break-all;
        }

        .repo-stars {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--warning);
            font-size: 0.875rem;
            margin-top: 0.35rem;
            font-weight: 600;
        }

        .repo-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1.25rem;
            line-height: 1.6;
        }

        .repo-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.2s ease;
            padding: 0.4rem 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .repo-link:hover {
            color: var(--accent-light);
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        /* Loading & States */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 5rem;
            color: var(--text-secondary);
        }

        /* Detail Page */
        .detail-header {
            margin-bottom: 2.5rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.875rem;
            margin-bottom: 1.75rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent-light);
            background: rgba(99, 102, 241, 0.1);
            transform: translateX(-4px);
        }

        .detail-title {
            font-size: 2.25rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .detail-desc {
            color: var(--text-secondary);
            margin-bottom: 1.25rem;
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .detail-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .meta-item a {
            color: var(--accent-light);
            text-decoration: none;
            font-weight: 500;
        }

        .meta-item a:hover {
            text-decoration: underline;
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-primary);
        }

        /* Releases */
        .releases-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .release-item {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .release-item:hover {
            border-color: var(--border-glow);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .release-header {
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .release-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .release-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .release-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-light);
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
            padding: 0.35rem 0.9rem;
            border-radius: 8px;
            border: 1px solid var(--border-glow);
            font-weight: 600;
        }

        .release-date {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .release-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            background: var(--warning);
            color: #000;
            font-weight: 700;
        }

        .release-toggle {
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .release-toggle.expanded {
            transform: rotate(180deg);
        }

        .release-content {
            padding: 0 1.5rem 1.5rem;
            border-top: 1px solid var(--border);
            display: none;
        }

        .release-content.expanded {
            display: block;
        }

        .asset-list {
            margin-top: 1.25rem;
        }

        .asset-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .asset-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            flex: 1;
            min-width: 0;
        }

        .asset-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-light);
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .asset-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .asset-size {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .download-btn {
            padding: 0.55rem 1.25rem;
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }

        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Downloads Page */
        .downloads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .downloads-header .back-btn {
            margin-right: 0;
        }

        .downloads-title {
            font-size: 1.6rem;
            font-weight: 700;
            flex: 1;
            text-align: center;
        }

        .clear-btn {
            padding: 0.6rem 1.25rem;
            background: transparent;
            border: 1px solid var(--error);
            border-radius: 10px;
            color: var(--error);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .clear-btn:hover {
            background: var(--error);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }

        .downloads-list {
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .download-item {
            display: flex;
            align-items: center;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }

        .download-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .download-item:last-child {
            border-bottom: none;
        }

        .download-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--success);
            margin-right: 1rem;
            flex-shrink: 0;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .download-info {
            flex: 1;
            min-width: 0;
        }

        .download-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }

        .download-meta {
            display: flex;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 0.35rem;
        }

        .download-actions {
            display: flex;
            gap: 0.6rem;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            color: var(--accent-light);
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .action-btn.delete:hover {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 1rem;
            padding: 1.25rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
        }

        .progress-bar {
            height: 10px;
            background: var(--bg-secondary);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 5px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            padding: 1.1rem 1.75rem;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 0.85rem;
            animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .toast.success {
            border-color: var(--success);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 30px rgba(16, 185, 129, 0.15);
        }

        .toast.error {
            border-color: var(--error);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 30px rgba(239, 68, 68, 0.15);
        }

            const handleSearch = useCallback(async (searchQuery) => {
                if (!searchQuery.trim()) return;

                setLoading(true);
                setLoadingText('搜索仓库中...');
                setTranslateEnabled(false);
                setTranslatedDescs({});
                try {
                    // 第一步：先搜索输入词查询公共存储库，结合选择的MCU
                    const searchTerms = `${searchQuery} ${selectedMCU}`;
                    const res = await fetch(
                        `${GITHUB_API}/search/repositories?q=${encodeURIComponent(searchTerms)}&sort=stars&order=desc&per_page=100`
                    );
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    const data = await res.json();
                    const allRepos = data.items || [];

                    // 第二步：在公共库里面搜索输入词（筛选与输入词相关的仓库）
                    const relatedRepos = allRepos.filter(repo => {
                        const nameMatch = repo.name.toLowerCase().includes(searchQuery.toLowerCase());
                        const descMatch = repo.description?.toLowerCase().includes(searchQuery.toLowerCase());
                        const mcuMatch = repo.name.toLowerCase().includes(selectedMCU.toLowerCase()) || 
                                        repo.description?.toLowerCase().includes(selectedMCU.toLowerCase());
                        return nameMatch || descMatch || mcuMatch;
                    });

                    // 第三步：检查每个仓库是否有发行或Source code
                    const validRepos = [];
                    let checked = 0;

                    for (const repo of relatedRepos) {
                        checked++;
                        setLoadingText(`检查仓库 ${checked}/${relatedRepos.length}...`);
                        
                        let hasReleases = false;
                        let latestRelease = null;
                        
                        try {
                            // 添加超时处理
                            const controller = new AbortController();
                            const timeoutId = setTimeout(() => controller.abort(), 3000);
                            
                            // 检查是否有 releases
                            const releasesRes = await fetch(
                                `${GITHUB_API}/repos/${repo.owner.login}/${repo.name}/releases?per_page=1`,
                                { signal: controller.signal }
                            );
                            clearTimeout(timeoutId);
                            
                            if (releasesRes.ok) {
                                const releases = await releasesRes.json();
                                if (Array.isArray(releases) && releases.length > 0) {
                                    hasReleases = true;
                                    latestRelease = releases[0];
                                }
                            }
                        } catch (e) {
                            // 检查失败，继续处理
                        }
                        
                        // 检查是否有Source code（仓库大小 > 0 或有默认分支）
                        const hasSourceCode = repo.size > 0 || repo.default_branch;
                        
                        // 仅保留有发行或Source code的仓库
                        if (hasReleases || hasSourceCode) {
                            repo.hasReleases = hasReleases;
                            repo.latest_release = latestRelease;
                            repo.hasSourceCode = hasSourceCode;
                            validRepos.push(repo);
                        }
                    }

                    setRepos(validRepos);

                    // Save to history
                    const newHistory = [searchQuery, ...searchHistory.filter(h => h !== searchQuery)].slice(0, 10);
                    localStorage.setItem('esp32_search_history', JSON.stringify(newHistory));
                    setSearchHistory(newHistory);
                } catch (err) {
                    console.error('Search failed:', err);
                    setToast('搜索失败，请重试', 'error');
                }
                setLoading(false);
                setLoadingText('搜索中...');
            }, [searchHistory, setSearchHistory, setToast, selectedMCU]);

            const handleSubmit = (e) => {
                e.preventDefault();
                handleSearch(query);
            };

            const handleHistoryClick = (term) => {
                setQuery(term);
                handleSearch(term);
            };

            const handleRepoClick = (repo) => {

            const translateDescriptions = async () => {
                if (translateEnabled) {
                    setTranslateEnabled(false);
                    return;
                }

                setTranslating(true);
                setTransProgress(0);
                const newTrans = {};
                const reposWithDesc = repos.filter(r => r.description && !translatedDescs[r.id]);

                for (let i = 0; i < reposWithDesc.length; i++) {
                    const repo = reposWithDesc[i];
                    try {
                        // Check cache first
                        const cacheKey = `trans_${repo.id}`;
                        const cached = localStorage.getItem(cacheKey);
                        if (cached) {
                            newTrans[repo.id] = cached;
                        } else {
                            const res = await fetch(
                                `https://api.mymemory.translated.net/get?q=${encodeURIComponent(repo.description)}&langpair=en|zh-CN`
                            );
                            const data = await res.json();
                            if (data.responseStatus === 200 && data.responseData?.translatedText) {
                                const translated = data.responseData.translatedText;
                                newTrans[repo.id] = translated;
                                localStorage.setItem(cacheKey, translated);
                            } else {
                                newTrans[repo.id] = repo.description;
                            }
                        }
                    } catch (err) {
                        newTrans[repo.id] = repo.description;
                    }
                    setTransProgress(Math.round(((i + 1) / reposWithDesc.length) * 100));
                }

                setTranslatedDescs(prev => ({ ...prev, ...newTrans }));
                setTranslateEnabled(true);
                setTranslating(false);
            };

            return (

        // Detail Page
        function DetailPage() {
            const { selectedRepo, goBack, setToast, favorites, toggleFavorite } = useContext(AppContext);
            const [releases, setReleases] = useState([]);
            const [loading, setLoading] = useState(true);
            const [expandedRelease, setExpandedRelease] = useState(null);

            useEffect(() => {
                if (selectedRepo) {
                    fetchReleases();
                } else {
                    // 如果没有选中仓库，跳回上一页
                    goBack();
                }
            }, [selectedRepo, goBack]);

            const fetchReleases = async () => {
                if (!selectedRepo) return;
                setLoading(true);
                try {
                    const [owner, repo] = selectedRepo.full_name.split('/');
                    const res = await fetch(`${GITHUB_API}/repos/${owner}/${repo}/releases`);
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    const data = await res.json();
                    setReleases(Array.isArray(data) ? data : []);
                } catch (err) {
                    console.error('Failed to fetch releases:', err);
                    setToast('获取版本失败，请检查网络', 'error');
                    setReleases([]);
                }
                setLoading(false);
            };

            const handleDownload = async (url, name) => {
                let fileSize = 0;

                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        mode: 'cors',
                        headers: {
                            'Accept': '*/*',
                        },
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const contentLength = response.headers.get('Content-Length');
                    fileSize = contentLength ? parseInt(contentLength, 10) : 0;

                    const blob = await response.blob();
                    if (blob.size > 0) {
                        fileSize = blob.size;
                    }

                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = name;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(link.href);

                    setToast(`已开始下载: ${name}`, 'success');
                } catch (error) {
                    console.error('Download failed:', error);
                    
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = name;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    setToast(`正在打开下载页面...`, 'info');
                } finally {
                    const downloads = JSON.parse(localStorage.getItem('esp32_downloads') || '[]');
                    downloads.unshift({
                        name: name,
                        size: fileSize,
                        url: url,
                        repo: selectedRepo.full_name,
                        downloadedAt: new Date().toISOString()
                    });
                    localStorage.setItem('esp32_downloads', JSON.stringify(downloads.slice(0, 100)));
                }
            };

            const formatSize = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };

            const formatDate = (dateStr) => {
                return new Date(dateStr).toLocaleDateString('zh-CN');
            };

            return (
                <div>
                    <div className="detail-header">
                        <div style={{ display: 'flex', alignItems: 'center', gap: '1rem', marginBottom: '1rem' }}>
                            <button className="back-btn" onClick={goBack}>
                                <Icons.ArrowLeft /> 返回上一页
                            </button>
                            <button
                                onClick={() => toggleFavorite(selectedRepo)}
                                style={{
                                    background: 'var(--bg-card)',
                                    border: '1px solid var(--border)',
                                    borderRadius: '10px',
                                    padding: '0.6rem 1rem',
                                    cursor: 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '0.5rem',
                                    transition: 'all 0.2s',
                                    color: favorites.includes(`${selectedRepo.owner.login}/${selectedRepo.name}`) ? '#f59e0b' : 'var(--text-secondary)'
                                }}
                            >
                                {favorites.includes(`${selectedRepo.owner.login}/${selectedRepo.name}`) ? '⭐' : '☆'}
                                收藏
                            </button>
                        </div>

                        <h1 className="detail-title">{selectedRepo?.full_name}</h1>
                        <p className="detail-desc">{selectedRepo?.description || '暂无描述'}</p>

                        <div className="detail-meta">
                            <div className="meta-item">
                                <Icons.Star /> {selectedRepo?.stargazers_count.toLocaleString()} 星标
                            </div>
                            <div className="meta-item">
                                <a href={selectedRepo?.html_url} target="_blank" rel="noopener noreferrer">
                                    <Icons.ExternalLink /> 在 GitHub 查看
                                </a>
                            </div>
                            {/* 源代码下载 */}
                            {selectedRepo?.default_branch && (
                                <div className="meta-item">
                                    <a href={`${selectedRepo.html_url}/archive/refs/heads/${selectedRepo.default_branch}.zip`} onClick={(e) => {
                                        e.stopPropagation();
                                        handleDownload(
                                            `${selectedRepo.html_url}/archive/refs/heads/${selectedRepo.default_branch}.zip`,
                                            `${selectedRepo.name}-${selectedRepo.default_branch}.zip`
                                        );
                                    }} className="download-btn" style={{ display: 'inline-flex', alignItems: 'center', gap: '0.5rem', textDecoration: 'none', color: 'var(--text-primary)', background: 'var(--accent)', padding: '0.5rem 1rem', borderRadius: '8px' }}>
                                        <Icons.Download /> 下载源代码
                                    </a>
                                </div>
                            )}
                        </div>
                    </div>

                    <h2 className="section-title">
                        <Icons.Download /> 版本列表 ({releases.length})
                    </h2>

                    {loading && (
                        <div className="loading">
                            <div className="spinner"></div>
                            <span>加载中...</span>
                        </div>
                    )}

                    {!loading && releases.length === 0 && (
                        <div className="empty-state">
                            <p>暂无版本发布</p>
                            <p style={{ fontSize: '0.875rem', marginTop: '0.5rem', color: 'var(--text-secondary)' }}>
                                您可以下载源代码
                            </p>
                        </div>
                    )}

                    <div className="releases-list">
                        {releases.map((release) => (
                            <div key={release.id} className="release-item">
                                <div
                                    className="release-header"
                                    onClick={() => setExpandedRelease(expandedRelease === release.tag_name ? null : release.tag_name)}
                                >
                                    <div className="release-info">
                                        <span className="release-tag">{release.tag_name}</span>
                                        <span className="release-date">
                                            {formatDate(release.published_at)}
                                        </span>
                                        {release.prerelease && (
                                            <span className="release-badge">预发布</span>
                                        )}
                                    </div>
                                    <div className={`release-toggle ${expandedRelease === release.tag_name ? 'expanded' : ''}`}>
                                        <Icons.ChevronDown />
                                    </div>
                                </div>

                                <div className={`release-content ${expandedRelease === release.tag_name ? 'expanded' : ''}`}>
                                    {release.name && (
                                        <p style={{ color: 'var(--text-secondary)', marginBottom: '0.5rem' }}>
                                            {release.name}
                                        </p>
                                    )}

                                    <div className="asset-list">
                                        {release.assets && release.assets.length > 0 ? (
                                            release.assets.map((asset) => (
                                                <div key={asset.id} className="asset-item">
                                                    <div className="asset-info">
                                                        <div className="asset-icon">
                                                            <Icons.File />
                                                        </div>
                                                        <div>
                                                            <div className="asset-name">{asset.name}</div>
                                                            <div className="asset-size">{formatSize(asset.size)}</div>
                                                        </div>
                                                    </div>
                                                    <button
                                                        className="download-btn"
                                                        onClick={() => handleDownload(asset.browser_download_url, asset.name)}
                                                    >
                                                        <Icons.Download /> 下载
                                                    </button>
                                                </div>
                                            ))
                                        ) : (
                                            <p style={{ color: 'var(--text-secondary)', padding: '0.75rem' }}>
                                                此版本暂无固件文件
                                            </p>
                                        )}

                                        {/* 源代码下载链接 */}
                                        <div style={{ marginTop: '0.75rem', paddingTop: '0.75rem', borderTop: '1px solid var(--border)' }}>
                                                <p style={{ color: 'var(--text-secondary)', fontSize: '0.875rem', marginBottom: '0.5rem' }}>
                                                    源代码：
                                            </p>
                                                <div className="asset-list">
                                                    <div className="asset-item">
                                                        <div className="asset-info">
                                                            <div className="asset-icon">
                                                                <Icons.File />
                                                            </div>
                                                            <div>
                                                                <div className="asset-name">{release.tag_name}.zip</div>
                                                            </div>
                                                        </div>
                                                        <button
                                                            className="download-btn"
                                                            onClick={() => handleDownload(release.zipball_url, `${release.tag_name}.zip`)}
                                                        >
                                                            <Icons.Download /> ZIP
                                                        </button>
                                                    </div>
                                                    <div className="asset-item">
                                                        <div className="asset-info">
                                                            <div className="asset-icon">
                                                                <Icons.File />
                                                            </div>
                                                            <div>
                                                                <div className="asset-name">{release.tag_name}.tar.gz</div>
                                                            </div>
                                                        </div>
                                                        <button
                                                            className="download-btn"
                                                            onClick={() => handleDownload(release.tarball_url, `${release.tag_name}.tar.gz`)}
                                                        >
                                                            <Icons.Download /> TAR.GZ
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Downloads Page
        function DownloadsPage() {
            const { goBack, setToast } = useContext(AppContext);
            const [downloads, setDownloads] = useState([]);

            useEffect(() => {
                loadDownloads();
            }, []);

            const loadDownloads = () => {
                const data = JSON.parse(localStorage.getItem('esp32_downloads') || '[]');
                setDownloads(data);
            };

            const handleDelete = (index) => {
                const newDownloads = downloads.filter((_, i) => i !== index);
                localStorage.setItem('esp32_downloads', JSON.stringify(newDownloads));
                setDownloads(newDownloads);
                setToast('已删除记录', 'success');
            };

            const handleClear = () => {
                localStorage.removeItem('esp32_downloads');
                setDownloads([]);
                setToast('已清空记录', 'success');
            };

            const handleReDownload = async (item) => {
                try {
                    const response = await fetch(item.url, {
                        method: 'GET',
                        mode: 'cors',
                        headers: {
                            'Accept': '*/*',
                        },
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const blob = await response.blob();
                    const link = document.createElement('a');
                    link.href = window.URL.createObjectURL(blob);
                    link.download = item.name;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(link.href);

                    setToast(`已开始下载: ${item.name}`, 'success');
                } catch (error) {
                    console.error('Download failed:', error);
                    
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.download = item.name;
                    link.target = '_blank';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    setToast(`正在打开下载页面...`, 'info');
                }
            };

            const formatSize = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            };

            const formatDate = (dateStr) => {
                return new Date(dateStr).toLocaleDateString('zh-CN') + ' ' +
                       new Date(dateStr).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            };

            return (
                <div>
                    <div className="downloads-header">
                        <button className="back-btn" onClick={goBack}>
                            <Icons.ArrowLeft /> 返回上一页
                        </button>
                        <h1 className="downloads-title">下载管理</h1>
                        {downloads.length > 0 && (
                            <button className="clear-btn" onClick={handleClear}>
                                清空记录
                            </button>
                        )}
                    </div>

                    {downloads.length === 0 && (
                        <div className="empty-state">
                            <Icons.Folder />
                            <p style={{ marginTop: '1rem' }}>暂无下载记录</p>
                        </div>
                    )}

                    {downloads.length > 0 && (
                        <div className="downloads-list">
                            {downloads.map((item, index) => (
                                <div key={index} className="download-item">
                                    <div className="download-icon">
                                        <Icons.Check />
                                    </div>
                                    <div className="download-info">
                                        <div className="download-name">{item.name}</div>
                                        <div className="download-meta">
                                            <span>{formatSize(item.size)}</span>
                                            <span>•</span>
                                            <span>{item.repo}</span>
                                            <span>•</span>
                                            <span>{formatDate(item.downloadedAt)}</span>
                                        </div>
                                    </div>
                                    <div className="download-actions">
                                        <button
                                            className="action-btn"
                                            onClick={() => handleReDownload(item)}
                                            title="重新下载"
                                        >
                                            <Icons.Download />
                                        </button>
                                        <button
                                            className="action-btn delete"
                                            onClick={() => handleDelete(index)}
                                            title="删除记录"
                                        >
                                            <Icons.Trash />
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // Favorites Page
        function FavoritesPage() {
            const { goBack, setCurrentPage, setSelectedRepo, setToast, favorites, toggleFavorite } = useContext(AppContext);
            const [favRepos, setFavRepos] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                loadFavorites();
            }, [favorites]);

            const loadFavorites = async () => {
                setLoading(true);
                const repos = [];
                for (const repoId of favorites) {
                    try {
                        const [owner, name] = repoId.split('/');
                        const res = await fetch(`${GITHUB_API}/repos/${owner}/${name}`);
                        if (res.ok) {
                            const repo = await res.json();
                            
                            // Check releases
                            try {
                                const releasesRes = await fetch(`${GITHUB_API}/repos/${owner}/${name}/releases?per_page=1`);
                                if (releasesRes.ok) {
                                    const releases = await releasesRes.json();
                                    if (Array.isArray(releases) && releases.length > 0) {
                                        repo.hasReleases = true;
                                        repo.latest_release = releases[0];
                                    } else {
                                        repo.hasReleases = false;
                                    }
                                }
                            } catch {
                                repo.hasReleases = false;
                            }
                            
                            repo.hasSourceCode = repo.size > 0 || repo.default_branch;
                            repos.push(repo);
                        }
                    } catch (err) {
                        console.error(`Failed to load repo ${repoId}:`, err);
                    }
                }
                setFavRepos(repos);
                setLoading(false);
            };

            const handleRepoClick = (repo) => {
                setSelectedRepo(repo);
                setCurrentPage('detail', repo);
            };

            return (
                <div>
                    <div className="downloads-header">
                        <button className="back-btn" onClick={goBack}>
                            <Icons.ArrowLeft /> 返回上一页
                        </button>
                        <h1 className="downloads-title">收藏夹 ({favorites.length})</h1>
                        {favorites.length > 0 && (
                            <button
                                className="clear-btn"
                                onClick={() => {
                                    if (confirm('确定要清空收藏夹吗？')) {
                                        localStorage.removeItem('esp32_favorites');
                                        window.location.reload();
                                    }
                                }}
                            >
                                清空
                            </button>
                        )}
                    </div>

                    {loading && (
                        <div className="loading">
                            <div className="spinner"></div>
                            <span>加载中...</span>
                        </div>
                    )}

                    {!loading && favRepos.length === 0 && (
                        <div className="empty-state">
                            <Icons.Heart />
                            <p style={{ marginTop: '1rem' }}>暂无收藏</p>
                            <p style={{ fontSize: '0.875rem', marginTop: '0.5rem', color: 'var(--text-secondary)' }}>
                                在搜索结果中点击星星按钮来收藏仓库
                            </p>
                        </div>
                    )}

                    {!loading && favRepos.length > 0 && (
                        <div className="repo-grid">
                            {favRepos.map((repo, index) => (
                                <div
                                    key={repo.id}
                                    className="repo-card"
                                    style={{ animationDelay: `${index * 50}ms` }}
                                    onClick={() => (repo.hasReleases || repo.hasSourceCode) && handleRepoClick(repo)}
                                >
                                    <div className="repo-header">
                                        <div className="repo-icon">
                                            <Icons.Chip />
                                        </div>
                                        <div className="repo-info">
                                            <div className="repo-name">{repo.full_name}</div>
                                            <div className="repo-stars">
                                                <Icons.Star /> {repo.stargazers_count.toLocaleString()}
                                            </div>
                                        </div>
                                        <button
                                            onClick={(e) => {
                                                e.stopPropagation();
                                                toggleFavorite(repo);
                                            }}
                                            style={{
                                                background: 'transparent',
                                                border: 'none',
                                                cursor: 'pointer',
                                                fontSize: '1.5rem',
                                                padding: '0.5rem',
                                                borderRadius: '8px',
                                                transition: 'all 0.2s',
                                                color: '#f59e0b'
                                            }}
                                        >
                                            ⭐
                                        </button>
                                    </div>
                                    {/* 状态标签 */}
                                    <div style={{
                                        display: 'flex',
                                        alignItems: 'center',
                                        gap: '0.5rem',
                                        marginBottom: '0.75rem',
                                        flexWrap: 'wrap'
                                    }}>
                                        {repo.latest_release && repo.hasReleases && (
                                            <div style={{
                                                display: 'flex',
                                                alignItems: 'center',
                                                gap: '0.5rem',
                                                padding: '0.375rem 0.5rem',
                                                background: 'var(--bg-card)',
                                                borderRadius: '8px',
                                                fontSize: '0.8rem'
                                            }}>
                                                <span style={{
                                                    background: 'var(--success)',
                                                    color: '#000',
                                                    padding: '0.125rem 0.5rem',
                                                    borderRadius: '4px',
                                                    fontWeight: 600
                                                }}>
                                                    📦
                                                </span>
                                                <span className="mono" style={{ color: 'var(--accent)', fontWeight: 600 }}>
                                                    {repo.latest_release.tag_name}
                                                </span>
                                                <span style={{ color: 'var(--text-secondary)' }}>
                                                    {new Date(repo.latest_release.published_at).toLocaleDateString('zh-CN')}
                                                </span>
                                            </div>
                                        )}
                                        {repo.hasSourceCode && !repo.hasReleases && (
                                            <div style={{
                                                display: 'flex',
                                                alignItems: 'center',
                                                gap: '0.5rem',
                                                padding: '0.375rem 0.5rem',
                                                background: 'var(--bg-secondary)',
                                                borderRadius: '8px',
                                                fontSize: '0.8rem'
                                            }}>
                                                <span style={{
                                                    background: 'var(--accent)',
                                                    color: '#fff',
                                                    padding: '0.125rem 0.5rem',
                                                    borderRadius: '4px',
                                                    fontWeight: 600
                                                }}>
                                                    💾
                                                </span>
                                                <span style={{ color: 'var(--text-secondary)' }}>
                                                    有源代码
                                                </span>
                                            </div>
                                        )}
                                    </div>
                                    <p className="repo-desc">{repo.description || '暂无描述'}</p>
                                    <a
                                        href={repo.html_url}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="repo-link"
                                        onClick={(e) => e.stopPropagation()}
                                    >
                                        <Icons.ExternalLink /> {repo.html_url}
                                    </a>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // Main App
        function App() {
            const [currentPage, setCurrentPage] = useState('search');
            const [pageHistory, setPageHistory] = useState(['search']);
            const [selectedRepo, setSelectedRepo] = useState(null);
            const [toast, setToast] = useState(null);
            const [searchHistory, setSearchHistory] = useState([]);
            const [selectedMCU, setSelectedMCU] = useState('esp32');
            const [favorites, setFavorites] = useState([]);

            useEffect(() => {
                const history = JSON.parse(localStorage.getItem('esp32_search_history') || '[]');
                const savedMCU = localStorage.getItem('esp32_selected_mcu') || 'esp32';
                const savedFavorites = JSON.parse(localStorage.getItem('esp32_favorites') || '[]');
                setSearchHistory(history);
                setSelectedMCU(savedMCU);
                setFavorites(savedFavorites);
            }, []);

            useEffect(() => {
                localStorage.setItem('esp32_selected_mcu', selectedMCU);
            }, [selectedMCU]);

            useEffect(() => {
                localStorage.setItem('esp32_favorites', JSON.stringify(favorites));
            }, [favorites]);

            const toggleFavorite = (repo) => {
                const repoId = `${repo.owner.login}/${repo.name}`;
                let newFavorites;
                if (favorites.includes(repoId)) {
                    newFavorites = favorites.filter(f => f !== repoId);
                    setToast({ message: '已从收藏夹移除', type: 'success' });
                } else {
                    newFavorites = [...favorites, repoId];
                    setToast({ message: '已添加到收藏夹', type: 'success' });
                }
                setFavorites(newFavorites);
            };

            const handleToastClose = useCallback(() => {
                setToast(null);
            }, []);

            const navigateToPage = useCallback((page, repo = null) => {
                setPageHistory(prev => [...prev, page]);
                if (repo) {
                    setSelectedRepo(repo);
                }
                setCurrentPage(page);
            }, []);

            const goBack = useCallback(() => {
                if (pageHistory.length > 1) {
                    const newHistory = pageHistory.slice(0, -1);
                    setPageHistory(newHistory);
                    const previousPage = newHistory[newHistory.length - 1];
                    setCurrentPage(previousPage);
                } else {
                    setCurrentPage('search');
                    setPageHistory(['search']);
                }
            }, [pageHistory]);

            return (
                <AppContext.Provider value={{
                    currentPage,
                    setCurrentPage: navigateToPage,
                    goBack,
                    selectedRepo,
                    setSelectedRepo,
                    toast,
                    setToast,
                    searchHistory,
                    setSearchHistory,
                    selectedMCU,
                    setSelectedMCU,
                    favorites,
                    setFavorites,
                    toggleFavorite
                }}>
                    <div className="app">
                        <Header />
                        <main className="main">
                            {currentPage === 'search' && <SearchPage />}
                            {currentPage === 'detail' && <DetailPage />}
                            {currentPage === 'favorites' && <FavoritesPage />}
                            {currentPage === 'downloads' && <DownloadsPage />}
                        </main>
                        {toast && (
                            <Toast
                                message={toast.message}
                                type={toast.type}
                                onClose={handleToastClose}
                            />
                        )}
                    </div>
                </AppContext.Provider>
            );
        }

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
